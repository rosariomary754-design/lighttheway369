<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Resource Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="emergency-exit" onclick="quickExit()">QUICK EXIT (ESC)</button>

    <header>
        <div class="container">
            <h1>Welcome Home</h1>
            <p>Safe resources for you and your family. No tracking. No logs.</p>
            
            <div class="controls">
                <select id="language-select">
                    <option value="en">English</option>
                    <option value="es">Español</option>
                </select>
                <input type="text" id="region-search" placeholder="Enter Region or Zip Code...">
            </div>
        </div>
    </header>

    <nav>
        <button onclick="filterCategory('all')">All Resources</button>
        <button onclick="filterCategory('legal')">Legal Help</button>
        <button onclick="filterCategory('food')">Food & Shelter</button>
        <button onclick="filterCategory('education')">Education</button>
        <button onclick="filterCategory('rights')">Know Your Rights</button>
    </nav>

    <main class="container" id="resource-grid">
        </main>

    <footer>
        <p>Your privacy is our priority. We do not store IP addresses or personal data.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
