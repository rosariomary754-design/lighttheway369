<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Lighthouse Portal | Safe & Anonymous</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="privacy-banner">
        <span class="icon">🛡️</span>
        <span id="privacy-text">We do not share or sell your personal data. We do not track your location or store your IP address.</span>
    </div>

    <nav class="top-nav">
        <div class="logo">The Lighthouse</div>
        <select id="languagePicker" onchange="changeLanguage()">
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="zh">中文 (Chinese - Mandarin)</option>
            <option value="ht">Kreyòl Ayisyen (Creole)</option>
        </select>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1 id="welcome-title">You are safe here.</h1>
            <p id="welcome-sub">Find local resources anonymously. No names, no tracking.</p>
            
            <div class="search-box">
                <input type="text" id="locationInput" placeholder="Enter Zip Code or Region...">
                <button onclick="searchResources()" id="search-btn">Find Help</button>
            </div>
        </div>
    </header>

    <div class="main-lighthouse-image-container">
        <img src="hero_lighthouse.img.jpg" alt="Lighthouse illustration" class="main-lighthouse-image">
    </div>

    <main class="container">
        <h2 id="category-title" class="section-title">What do you need help finding today?</h2>
        <div class="grid">
            <div class="card" onclick="showCategory('hotlines')">
                <div class="card-icon">📞</div>
                <h3 id="cat-hotlines">Emergency Hotlines</h3>
            </div>
            <div class="card" onclick="showCategory('food')">
                <div class="card-icon">🍎</div>
                <h3 id="cat-food">Food Resources</h3>
            </div>
            <div class="card" onclick="showCategory('shelter')">
                <div class="card-icon">🏠</div>
                <h3 id="cat-shelter">Shelter & Housing
